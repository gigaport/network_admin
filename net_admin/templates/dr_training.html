{% extends 'components/base.html' %}
{% load static %}

{% block content %}
  <!-- 로딩 오버레이 -->
  <div id="pageLoadingOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.3); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); transition: opacity 0.4s ease;">
    <div class="text-center">
      <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div style="font-size: 0.85rem; color: #475569; font-weight: 500;">장비 상태를 조회하는 중...</div>
    </div>
  </div>
  <div class="content">
    <nav class="mb-3" aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="#!">네트워크 모니터링</a></li>
        <li class="breadcrumb-item active">재해복구훈련</li>
      </ol>
    </nav>
    <div class="mb-9">
      <div class="row g-3 mb-4" style="margin: 0 auto;">
        <div class="col-auto">
          <h2 id="contents_title" class="mb-0">재해복구훈련 모니터링</h2>
        </div>
        <div class="col-auto ms-auto d-flex gap-2 align-items-center">
          <span id="lastUpdated" style="font-size: 0.75rem; color: #94a3b8;"></span>
          <select id="autoRefreshSelect" class="form-select form-select-sm" style="width: auto; font-size: 0.8rem;" onchange="handleAutoRefreshChange(this.value)">
            <option value="0">수동 갱신</option>
            <option value="10">10초 자동</option>
            <option value="30" selected>30초 자동</option>
            <option value="60">60초 자동</option>
          </select>
          <button class="btn btn-sm" onclick="fetchStatus()" style="background:#f8fafc; color:#64748b; border:1px solid #e2e8f0; border-radius:8px; font-size:0.85rem; padding:6px 16px;">
            <i class="fas fa-sync-alt me-1" style="font-size:0.7rem;"></i>새로고침
          </button>
        </div>
      </div>

      <!-- 통합 전환율 -->
      <div class="row g-3 mb-4" id="totalRateCards">
        <div class="col-6 col-lg-3">
          <div class="h-100 position-relative" id="totalMainCard" style="border-radius: 14px; padding: 20px 22px; background: linear-gradient(135deg, #059669, #34d399); box-shadow: 0 4px 15px rgba(5,150,105,0.3); overflow: hidden;">
            <div style="position: absolute; top: -10px; right: -10px; width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.1);"></div>
            <div class="d-flex align-items-center gap-3">
              <div style="width: 44px; height: 44px; min-width: 44px; border-radius: 12px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-building" style="color: #fff; font-size: 1rem;"></i>
              </div>
              <div>
                <div style="font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 2px;">가동전환율 (평상 시)</div>
                <div class="d-flex align-items-baseline gap-2">
                  <span class="fw-bold" id="totalMainPct" style="font-size: 4.2rem; color: #fff; line-height: 1;">-</span>
                  <span id="totalMainCount" style="font-size: 0.8rem; color: rgba(255,255,255,0.8);"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="h-100 position-relative" id="totalDrCard" style="border-radius: 14px; padding: 20px 22px; background: linear-gradient(135deg, #b91c1c, #ef4444); box-shadow: 0 4px 15px rgba(185,28,28,0.3); overflow: hidden;">
            <div style="position: absolute; top: -10px; right: -10px; width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.1);"></div>
            <div class="d-flex align-items-center gap-3">
              <div style="width: 44px; height: 44px; min-width: 44px; border-radius: 12px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shield-alt" style="color: #fff; font-size: 1rem;"></i>
              </div>
              <div>
                <div style="font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 2px;">DR전환율</div>
                <div class="d-flex align-items-baseline gap-2">
                  <span class="fw-bold" id="totalDrPct" style="font-size: 4.2rem; color: #fff; line-height: 1;">-</span>
                  <span id="totalDrCount" style="font-size: 0.8rem; color: rgba(255,255,255,0.8);"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12 col-lg-6">
          <div class="h-100 card border-0 shadow-sm bg-body-emphasis" style="border-radius: 14px; overflow: hidden;">
            <div class="card-body d-flex flex-column justify-content-center" style="padding: 16px 22px;">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <span style="font-size: 1.5rem; font-weight: 700; color: #334155;">전환율 현황</span>
                <span id="barTimestamp" style="font-size: 0.65rem; color: #94a3b8;"></span>
              </div>
              <!-- 가동전환율 바 -->
              <div class="d-flex align-items-center mb-2">
                <span style="min-width:70px;font-size:0.75rem;font-weight:600;color:#059669;">가동</span>
                <div class="flex-grow-1" style="height:26px;background:#f1f5f9;border-radius:13px;overflow:hidden;position:relative;">
                  <div id="barMain" style="position:absolute;top:0;left:0;height:100%;width:0%;background:linear-gradient(90deg,#059669,#34d399);border-radius:13px;transition:width 0.6s ease;"></div>
                  <span id="barMainLabel" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.75rem;font-weight:700;color:#1e293b;"></span>
                </div>
              </div>
              <!-- DR전환율 바 -->
              <div class="d-flex align-items-center">
                <span style="min-width:70px;font-size:0.75rem;font-weight:600;color:#dc2626;">DR</span>
                <div class="flex-grow-1" style="height:26px;background:#f1f5f9;border-radius:13px;overflow:hidden;position:relative;">
                  <div id="barDr" style="position:absolute;top:0;left:0;height:100%;width:0%;background:linear-gradient(90deg,#b91c1c,#ef4444);border-radius:13px;transition:width 0.6s ease;"></div>
                  <span id="barDrLabel" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.75rem;font-weight:700;color:#1e293b;"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 장비별 카드 -->
      <div id="deviceCards">
        <div class="text-center py-5" style="color: #94a3b8;">
          <div class="spinner-border spinner-border-sm me-2"></div>데이터를 불러오는 중...
        </div>
      </div>
    </div>

    <footer class="footer position-absolute">
      <div class="row g-0 justify-content-between align-items-center h-100">
        <div class="col-12 col-sm-auto text-center">
          <p class="mb-0 mt-2 mt-sm-0 text-body">Nextrade Network Admin<span class="d-none d-sm-inline-block"></span><span class="d-none d-sm-inline-block mx-1">|</span><br class="d-sm-none" />2025 &copy;<a class="mx-1" href="">RWS</a></p>
        </div>
        <div class="col-12 col-sm-auto text-center">
          <p class="mb-0 text-body-tertiary text-opacity-85">v1.23.0</p>
        </div>
      </div>
    </footer>
  </div>
  <div id="back_data" data-submenu="{{ sub_menu|escapejs }}"></div>
{% endblock %}


{% block scripts %}
<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'vendors/popper/popper.min.js' %}"></script>
<script src="{% static 'vendors/bootstrap/bootstrap.min.js' %}"></script>
<script src="{% static 'vendors/anchorjs/anchor.min.js' %}"></script>
<script src="{% static 'vendors/is/is.min.js' %}"></script>
<script src="{% static 'vendors/fontawesome/all.min.js' %}"></script>
<script src="{% static 'vendors/lodash/lodash.min.js' %}"></script>
<script src="{% static 'vendors/feather-icons/feather.min.js' %}"></script>
<script src="{% static 'vendors/dayjs/dayjs.min.js' %}"></script>
<script src="{% static 'assets/js/phoenix.js' %}"></script>
<script src="{% static 'assets/js/net_admin/dr_training.js' %}"></script>
{% endblock %}
