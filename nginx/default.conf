server {
	listen 80;
	server_name net_admin.local;

	# DNS resolver 설정 (Podman 내부 DNS - 자동 IP 재조회)
	resolver 10.89.0.1 valid=10s ipv6=off;
	resolver_timeout 5s;

	# 동적 upstream을 위한 변수 설정
	set $django_backend http://django:8080;
	set $fastapi_backend http://fastapi:8000;

	# FastAPI static files (swagger-ui)
	location /static/swagger-ui/ {
		proxy_pass $fastapi_backend;
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
	}

	# Django: static files (캐시 활성화)
	location /static/ {
		alias /app/staticfiles/;
		expires 1h;
		add_header Cache-Control "public, immutable";
		autoindex on;
	}

	# FastAPI
	location /api/ {
		proxy_pass $fastapi_backend;
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Timeout 설정 (멀티캐스트 데이터 수집 등 긴 요청 처리를 위해 180초로 증가)
		proxy_connect_timeout 180s;
		proxy_send_timeout 180s;
		proxy_read_timeout 180s;

		# 재시도 설정
		proxy_next_upstream error timeout http_502 http_503;
		proxy_next_upstream_tries 3;
	}

	# Kakao 우편번호 서비스 프록시 (브라우저 외부 접속 차단 우회)
	location /proxy/postcode/ {
		resolver 8.8.8.8 valid=30s ipv6=off;
		proxy_pass https://postcode.map.daum.net/;
		proxy_http_version 1.1;
		proxy_set_header Host postcode.map.daum.net;
		proxy_set_header Connection "";
		proxy_set_header Accept-Encoding "";
		proxy_ssl_server_name on;
		proxy_ssl_name postcode.map.daum.net;
		proxy_ssl_protocols TLSv1.2 TLSv1.3;

		sub_filter 'https://postcode.map.daum.net' '/proxy/postcode';
		sub_filter '//postcode.map.daum.net' '/proxy/postcode';
		sub_filter 'https://postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//t1.daumcdn.net/' '/proxy/cdn-daum/';
		sub_filter '//t1.kakaocdn.net/' '/proxy/cdn-kakao/';
		sub_filter_once off;
		sub_filter_types text/html text/javascript application/javascript text/css;
	}

	location /proxy/postcode-kakao/ {
		resolver 8.8.8.8 valid=30s ipv6=off;
		proxy_pass https://postcode.map.kakao.com/;
		proxy_http_version 1.1;
		proxy_set_header Host postcode.map.kakao.com;
		proxy_set_header Connection "";
		proxy_set_header Accept-Encoding "";
		proxy_ssl_server_name on;
		proxy_ssl_name postcode.map.kakao.com;
		proxy_ssl_protocols TLSv1.2 TLSv1.3;

		sub_filter 'https://postcode.map.daum.net' '/proxy/postcode';
		sub_filter '//postcode.map.daum.net' '/proxy/postcode';
		sub_filter 'https://postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//t1.daumcdn.net/' '/proxy/cdn-daum/';
		sub_filter '//t1.kakaocdn.net/' '/proxy/cdn-kakao/';
		sub_filter_once off;
		sub_filter_types text/html text/javascript application/javascript text/css application/json;
	}

	location /proxy/cdn-kakao/ {
		resolver 8.8.8.8 valid=30s ipv6=off;
		proxy_pass https://t1.kakaocdn.net/;
		proxy_http_version 1.1;
		proxy_set_header Host t1.kakaocdn.net;
		proxy_set_header Connection "";
		proxy_set_header Accept-Encoding "";
		proxy_ssl_server_name on;
		proxy_ssl_name t1.kakaocdn.net;
		proxy_ssl_protocols TLSv1.2 TLSv1.3;

		proxy_hide_header Cache-Control;
		proxy_hide_header Expires;
		add_header Cache-Control "no-cache, no-store, must-revalidate";

		sub_filter 'https://postcode.map.daum.net' '/proxy/postcode';
		sub_filter '//postcode.map.daum.net' '/proxy/postcode';
		sub_filter 'https://postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//t1.daumcdn.net/' '/proxy/cdn-daum/';
		sub_filter '//t1.kakaocdn.net/' '/proxy/cdn-kakao/';
		sub_filter_once off;
		sub_filter_types text/javascript application/javascript text/css;
	}

	location /proxy/cdn-daum/ {
		resolver 8.8.8.8 valid=30s ipv6=off;
		proxy_pass https://t1.daumcdn.net/;
		proxy_http_version 1.1;
		proxy_set_header Host t1.daumcdn.net;
		proxy_set_header Connection "";
		proxy_set_header Accept-Encoding "";
		proxy_ssl_server_name on;
		proxy_ssl_name t1.daumcdn.net;
		proxy_ssl_protocols TLSv1.2 TLSv1.3;

		proxy_hide_header Cache-Control;
		proxy_hide_header Expires;
		add_header Cache-Control "no-cache, no-store, must-revalidate";

		sub_filter 'https://postcode.map.daum.net' '/proxy/postcode';
		sub_filter '//postcode.map.daum.net' '/proxy/postcode';
		sub_filter 'https://postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//postcode.map.kakao.com' '/proxy/postcode-kakao';
		sub_filter '//t1.daumcdn.net/' '/proxy/cdn-daum/';
		sub_filter '//t1.kakaocdn.net/' '/proxy/cdn-kakao/';
		sub_filter_once off;
		sub_filter_types text/javascript application/javascript text/css;
	}

	# Django: main application
	location / {
		proxy_pass $django_backend;
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Timeout 설정 (멀티캐스트 데이터 수집 등 긴 요청 처리를 위해 180초로 증가)
		proxy_connect_timeout 180s;
		proxy_send_timeout 180s;
		proxy_read_timeout 180s;

		# 버퍼 설정
		proxy_buffering on;
		proxy_buffer_size 4k;
		proxy_buffers 8 4k;

		# Django 재시작 시 자동 재시도
		proxy_next_upstream error timeout http_502 http_503;
		proxy_next_upstream_tries 3;
	}
}
