version: '3.8'

x-common-env: &common_env
  TZ: Asia/Seoul

services:
  postgres-db:
    image: postgres:13
    container_name: postgres-db
    env_file: .env
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_config:/etc/postgresql:Z
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextrade"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # FastAPI 서비스
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.netview_fastapi
    container_name: netview_fastapi
    env_file: .env
    environment:
      <<: *common_env
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
    working_dir: /app
    volumes:
      - ./fastapi:/app:Z
      - ./common:/app/common:Z
      - ~/.ssh:/root/.ssh:ro
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: redis
    environment:
      <<: *common_env
    networks:
      - app-network

  # 배치 작업 서비스
  batch:
    build:
      context: .
      dockerfile: Dockerfile.batch
    container_name: network-admin-batch
    env_file: .env
    environment:
      <<: *common_env
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data:/app/data:Z
      - ./logs:/app/logs:Z
      - ./common:/app/common:ro,Z
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      - fastapi
      - postgres-db
    networks:
      - app-network
    restart: unless-stopped

# Django 웹 애플리케이션
  django:
    build:
      context: .
      dockerfile: Dockerfile.netview_django
      target: production
    image: netview_django:latest
    container_name: netview_django
    env_file: .env
    environment:
      <<: *common_env
      DJANGO_SETTINGS_MODULE: net_admin.settings
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data:/app/data:Z
      - ./logs:/app/logs:Z
      - ./common:/app/common:Z
      - ./net_admin:/app/net_admin:Z
      - ./entrypoint.sh:/app/entrypoint.sh:Z
      - django_migrations:/tmp
      - ~/.ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    command: ["/app/entrypoint.sh"]

  # Nginx 리버스 프록시
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: netview_nginx
    environment:
      <<: *common_env
    ports:
      - "3000:80"
    volumes:
      - ./net_admin/staticfiles:/app/staticfiles:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      django:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  django_migrations:
    driver: local
  # redis_data:
  #   driver: local
  # ssh_keys:
  #   driver: local
  # batch_logs:
  #   driver: local

networks:
  app-network:
    driver: bridge

